name: BandFitV2
options:
  bundleIdPrefix: com.bandfit
  deploymentTarget:
    iOS: "26.0"
    watchOS: "26.0"
  createIntermediateGroups: true

packages:
  BandFitKit:
    path: BandFitKit

targets:
  BandFitV2:
    type: application
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: BandFitV2
      - path: Shared
    resources:
      - path: BandFitV2/Assets.xcassets
    dependencies:
      - package: BandFitKit
      - target: "BandFitV2WatchApp"
        embed: true
        codeSignOnCopy: true
    info:
      path: BandFitV2/Info.plist
      properties:
        CFBundleDisplayName: BandFit V2
        UILaunchScreen: {}
        NSHealthShareUsageDescription: "BandFit V2 legge frequenza cardiaca, calorie e ossigenazione per mostrarle durante l'allenamento."
        NSHealthUpdateUsageDescription: "BandFit V2 salva i tuoi allenamenti su Salute/Fitness."
        NSMotionUsageDescription: "BandFit V2 usa i sensori di movimento per contare le ripetizioni quando non indossi l'Apple Watch."
        UIBackgroundModes: []
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
    entitlements:
      path: BandFitV2/BandFitV2.entitlements
      properties:
        com.apple.developer.healthkit: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.bandfit.appv2
        PRODUCT_NAME: "BandFit V2"
        MARKETING_VERSION: "2.0.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5"
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: true

  "BandFitV2WatchApp":
    type: application
    platform: watchOS
    deploymentTarget: "26.0"
    sources:
      - path: "BandFitV2WatchApp"
      - path: Shared
    resources:
      - path: "BandFitV2WatchApp/Assets.xcassets"
    dependencies:
      - package: BandFitKit
    info:
      path: "BandFitV2WatchApp/Info.plist"
      properties:
        CFBundleDisplayName: BandFit V2
        WKApplication: true
        WKCompanionAppBundleIdentifier: com.bandfit.appv2
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSHealthShareUsageDescription: "BandFit V2 legge frequenza cardiaca, calorie attive e ossigenazione del sangue durante l'allenamento."
        NSHealthUpdateUsageDescription: "BandFit V2 salva l'allenamento su Salute/Fitness al termine della sessione."
        NSMotionUsageDescription: "BandFit V2 usa accelerometro e giroscopio del Watch per contare automaticamente le ripetizioni."
        WKBackgroundModes:
          - workout-processing
    entitlements:
      path: "BandFitV2WatchApp/BandFitV2WatchApp.entitlements"
      properties:
        com.apple.developer.healthkit: true
        com.apple.developer.healthkit.background-delivery: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.bandfit.appv2.watchkitapp
        PRODUCT_NAME: "BandFit V2 Watch App"
        MARKETING_VERSION: "2.0.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5"
        SKIP_INSTALL: false
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_PREVIEWS: true
